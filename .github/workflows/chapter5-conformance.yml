name: Chapter 5 Conformance

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  chapter5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0.1"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Mix
        uses: actions/cache@v4
        with:
          path: |
            app/deps
            app/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('app/mix.lock', 'app/**/mix.exs') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Dependencies
        working-directory: app
        run: mix deps.get

      - name: Start Backend Services
        run: docker compose up -d memgraph xtdb nats

      - name: Wait For Backend Services
        run: |
          for target in 127.0.0.1:7687 127.0.0.1:5432 127.0.0.1:4222; do
            host="${target%:*}"
            port="${target##*:}"
            for attempt in $(seq 1 60); do
              if bash -lc "</dev/tcp/$host/$port" >/dev/null 2>&1; then
                echo "$target is ready"
                break
              fi
              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for $target"
                docker compose ps
                docker compose logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done

      - name: Run Chapter 5 Conformance Suite
        working-directory: app
        run: mix chapter5.conformance

      - name: Dump Backend Logs On Failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop Backend Services
        if: always()
        run: docker compose down -v
