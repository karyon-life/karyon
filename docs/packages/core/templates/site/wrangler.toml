name = "__PACKAGE_NAME__"
compatibility_date = "2026-04-05"
main = "./dist/_worker.js/index.js"

[[kv_namespaces]]
binding = "FORM_GUARD_KV"
id = "local-form-guard"
preview_id = "local-form-guard"

[[kv_namespaces]]
binding = "SESSION"
id = "local-session"
preview_id = "local-session"

[[d1_databases]]
binding = "SUBSCRIBERS_DB"
database_name = "__PACKAGE_NAME__-subscribers"
database_id = "local-subscribers"
migrations_dir = "./migrations"
