name: Publish @treeseed/core

on:
  workflow_dispatch:
  push:
    tags:
      - 'treeseed-core-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: docs/packages/core
        run: npm run release:check-tag -- "${GITHUB_REF_NAME}"

      - name: Install dependencies
        working-directory: docs/packages/core
        run: npm run release:setup

      - name: Check docs app
        working-directory: docs/packages/core
        run: npm run check

      - name: Build docs app
        working-directory: docs/packages/core
        run: npm run build

      - name: Publish package
        working-directory: docs/packages/core
        run: npm run release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
