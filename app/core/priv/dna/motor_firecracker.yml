cell_type: "motor_executor"
description: "Firecracker-based execution cell for isolated performance."
executor:
  module: "Sandbox.Executor"
  function: "capture_output"
allowed_actions:
  - "provision_vm"
  - "execute_patch"
  - "capture_output"
synapses:
  - type: "pull"
    bind: "tcp://127.0.0.1:0"
utility_threshold: 0.5
atp_requirement: 0.4
