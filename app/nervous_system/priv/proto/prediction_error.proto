syntax = "proto3";

package karyon.nervous_system;

message PredictionError {
  string type = 1;
  string message = 2;
  int64 timestamp = 3;
  map<string, string> metadata = 4;
  string cell_id = 5;
  string source = 6;
  float severity = 7;
  string source_node = 8;
  string predicted_target = 9;
  string corrected_target = 10;
}
